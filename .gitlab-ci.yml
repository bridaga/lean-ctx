stages:
  - build
  - deploy
  - verify

variables:
  GIT_DEPTH: 1
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  REMOTE_DIR: /home/administrator/lean-ctx
  CONTAINER_NAME: lean-ctx-web
  IMAGE_NAME: lean-ctx-web

cache:
  key: "${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}"
  paths:
    - .cargo/registry
    - rust/target/

build-rust:
  stage: build
  image: rust:latest
  script:
    - cd rust
    - cargo check --release
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - rust/**/*
    - if: $CI_COMMIT_TAG

build-website:
  stage: build
  image: node:22-alpine
  script:
    - cd website
    - npm ci --no-audit --no-fund
    - npm run build
  artifacts:
    paths:
      - website/dist/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy-website:
  stage: deploy
  image: alpine:3.19
  needs:
    - build-website
  before_script:
    - apk add --no-cache openssh-client rsync curl
    - mkdir -p ~/.ssh
    - echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
    - chmod 600 ~/.ssh/deploy_key
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - >-
      rsync -az --delete
      -e "ssh -i ~/.ssh/deploy_key"
      --exclude ".git"
      --exclude "node_modules"
      --exclude "website/node_modules"
      --exclude "website/dist"
      --exclude ".env"
      --exclude "deploy.sh"
      --exclude "rust/target"
      ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${REMOTE_DIR}/"
    - |
      ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s \
        "$DEPLOY_SUDO_PASSWORD" << 'DEPLOY'
        set -euo pipefail
        PASS="$1"
        REPO="/home/administrator/lean-ctx"
        DOMAIN="leanctx.com"

        cd "$REPO"

        echo "[deploy] Building Docker image..."
        echo "$PASS" | sudo -S docker build --no-cache -f Dockerfile.web -t lean-ctx-web . 2>&1 | tail -12

        echo "[deploy] Restarting container..."
        echo "$PASS" | sudo -S docker stop lean-ctx-web 2>/dev/null || true
        echo "$PASS" | sudo -S docker rm lean-ctx-web 2>/dev/null || true

        echo "$PASS" | sudo -S docker run -d \
          --name lean-ctx-web \
          --network coolify \
          --restart unless-stopped \
          -l "traefik.enable=true" \
          -l "traefik.docker.network=coolify" \
          -l "traefik.http.routers.lean-ctx.rule=Host(\`$DOMAIN\`) || Host(\`www.$DOMAIN\`) || Host(\`lean-ctx.pounce.ch\`) || Host(\`leanctx.tech\`) || Host(\`www.leanctx.tech\`)" \
          -l "traefik.http.routers.lean-ctx.entrypoints=https" \
          -l "traefik.http.routers.lean-ctx.tls=true" \
          -l "traefik.http.routers.lean-ctx.tls.certresolver=letsencrypt" \
          -l "traefik.http.services.lean-ctx.loadbalancer.server.port=80" \
          lean-ctx-web

        echo "[deploy] lean-ctx-web running on $DOMAIN"
      DEPLOY
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

verify-website:
  stage: verify
  image: alpine:3.19
  needs:
    - deploy-website
  script:
    - apk add --no-cache curl
    - sleep 8
    - |
      HTTP_CODE=$(curl -so /dev/null -w "%{http_code}" --max-time 15 "https://leanctx.com/" || echo "000")
      echo "https://leanctx.com/ → HTTP $HTTP_CODE"
      if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ]; then
        echo "Verification passed."
      else
        echo "WARNING: Unexpected status $HTTP_CODE"
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  allow_failure: true
